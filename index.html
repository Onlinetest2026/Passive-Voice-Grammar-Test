<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secure Online Test</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:#111;
}

/* Màn hình bắt đầu */

#startScreen{
    position:fixed;
    width:100%;
    height:100%;
    background:#111;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:99999;
    text-align:center;
    padding:20px;
}

#startScreen h1{
    font-size:40px;
    margin-bottom:20px;
}

#startScreen p{
    font-size:18px;
    margin-bottom:30px;
}

#startBtn{
    padding:15px 40px;
    font-size:22px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#00b894;
    color:white;
}

/* Cảnh báo */

#warning{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:red;
    color:white;
    text-align:center;
    padding:15px;
    z-index:9999;
    display:none;
    font-size:20px;
    font-weight:bold;
}

/* Màn hình khóa */

#blocked{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    color:white;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:100000;
    text-align:center;
    padding:20px;
}

#blocked h1{
    font-size:45px;
    margin-bottom:20px;
    color:red;
}

#blocked p{
    font-size:22px;
}

/* Google Form */

iframe{
    width:100%;
    height:100vh;
    border:none;
}

</style>
</head>

<body>

<!-- Màn hình bắt đầu -->

<div id="startScreen">

    <h1>KIỂM TRA ONLINE</h1>

    <p>
        Sau khi bắt đầu làm bài:
        <br><br>
        ❌ Không chuyển tab
        <br>
        ❌ Không mở cửa sổ khác
        <br>
        ❌ Không copy nội dung
        <br><br>
        Nếu vi phạm 1 lần sẽ bị loại khỏi bài kiểm tra.
    </p>

    <button id="startBtn" onclick="startExam()">
        BẮT ĐẦU LÀM BÀI
    </button>

</div>

<!-- Cảnh báo -->

<div id="warning">
    ⚠️ PHÁT HIỆN CHUYỂN TAB / RỜI KHỎI CỬA SỔ!
</div>

<!-- Màn hình khóa -->

<div id="blocked">

    <h1>BẠN ĐÃ BỊ LOẠI</h1>

    <p>
        Hệ thống phát hiện hành vi gian lận.
    </p>

</div>

<!-- GOOGLE FORM -->

<iframe
src="https://docs.google.com/forms/d/e/1FAIpQLSew_ygoZvP1kBtK74vuknMUUkbslawSg9ixdvZMnKoYtSrxQg/viewform?embedded=true">
</iframe>

<script>

/* =========================
   CẤU HÌNH
========================= */

const webhook =
"https://discord.com/api/webhooks/1502994532126560276/UO-dj1ynL5CDJk23Sz8QZt74xCI_QmTQtti-_SG38-Y0O1bALNrNfd5Z34j9Tp0xvMoZ";

/* =========================
   BIẾN
========================= */

let cheated = false;
let examStarted = false;

/* =========================
   BẮT ĐẦU THI
========================= */

function startExam(){

    examStarted = true;

    document
    .getElementById("startScreen")
    .style.display = "none";

}

/* =========================
   GỬI LOG GIAN LẬN
========================= */

function sendCheatLog(reason){

    fetch(webhook,{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            content:
            "🚨 HỌC SINH GIAN LẬN\n\n"
            + "Lý do: " + reason + "\n"
            + "Thời gian: "
            + new Date().toLocaleString()

        })

    });

}

/* =========================
   KHÓA BÀI
========================= */

function blockStudent(reason){

    cheated = true;

    document
    .getElementById("blocked")
    .style.display = "flex";

    sendCheatLog(reason);

}

/* =========================
   PHÁT HIỆN CHUYỂN TAB
========================= */

document.addEventListener(

    "visibilitychange",

    ()=>{

        if(
            examStarted &&
            document.hidden &&
            !cheated
        ){

            document
            .getElementById("warning")
            .style.display = "block";

            setTimeout(()=>{

                blockStudent(
                    "Chuyển tab hoặc rời cửa sổ"
                );

            },500);

        }

    }

);

/* =========================
   PHÁT HIỆN RỜI CỬA SỔ
========================= */

window.addEventListener(

    "blur",

    ()=>{

        if(
            examStarted &&
            !cheated
        ){

            document
            .getElementById("warning")
            .style.display = "block";

            setTimeout(()=>{

                blockStudent(
                    "Rời khỏi cửa sổ kiểm tra"
                );

            },500);

        }

    }

);

/* =========================
   CHẶN COPY
========================= */

document.addEventListener(

    "copy",

    (e)=>{

        if(examStarted){

            e.preventDefault();

            alert("Không được copy!");

            sendCheatLog(
                "Copy nội dung"
            );

        }

    }

);

/* =========================
   CHẶN PASTE
========================= */

document.addEventListener(

    "paste",

    (e)=>{

        if(examStarted){

            e.preventDefault();

        }

    }

);

/* =========================
   CHẶN CUT
========================= */

document.addEventListener(

    "cut",

    (e)=>{

        if(examStarted){

            e.preventDefault();

        }

    }

);

/* =========================
   CHẶN CHUỘT PHẢI
========================= */

document.addEventListener(

    "contextmenu",

    (e)=>{

        e.preventDefault();

    }

);

/* =========================
   CHẶN PHÍM TẮT
========================= */

document.addEventListener(

    "keydown",

    (e)=>{

        /* F12 */

        if(e.key === "F12"){

            e.preventDefault();

        }

        /* Ctrl + C */

        if(
            e.ctrlKey &&
            e.key.toLowerCase() === "c"
        ){

            e.preventDefault();

        }

        /* Ctrl + U */

        if(
            e.ctrlKey &&
            e.key.toLowerCase() === "u"
        ){

            e.preventDefault();

        }

        /* Ctrl + Shift + I */

        if(
            e.ctrlKey &&
            e.shiftKey &&
            e.key.toLowerCase() === "i"
        ){

            e.preventDefault();

        }

        /* Ctrl + Shift + J */

        if(
            e.ctrlKey &&
            e.shiftKey &&
            e.key.toLowerCase() === "j"
        ){

            e.preventDefault();

        }

    }

);

</script>

</body>
</html>
