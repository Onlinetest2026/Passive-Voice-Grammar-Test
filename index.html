<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Anti Cheat Exam</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        background:#f4f6f9;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .container{
        width:420px;
        background:white;
        padding:35px;
        border-radius:18px;
        box-shadow:0 10px 25px rgba(0,0,0,0.1);
        text-align:center;
    }

    h1{
        margin-bottom:20px;
        color:#222;
    }

    input{
        width:100%;
        padding:14px;
        border-radius:10px;
        border:1px solid #ccc;
        margin-bottom:20px;
        font-size:16px;
    }

    button{
        width:100%;
        padding:14px;
        border:none;
        background:#111827;
        color:white;
        font-size:18px;
        border-radius:10px;
        cursor:pointer;
        transition:0.2s;
    }

    button:hover{
        opacity:0.9;
    }

    .hidden{
        display:none;
    }

    .timer{
        font-size:22px;
        font-weight:bold;
        margin-bottom:20px;
        color:#dc2626;
    }

    iframe{
        width:100%;
        height:500px;
        border:none;
        border-radius:10px;
    }

    .warning{
        margin-top:15px;
        color:red;
        font-weight:bold;
    }
</style>
</head>

<body>

<div class="container">

    <!-- LOGIN -->
    <div id="loginBox">
        <h1>START</h1>

        <input type="text" id="studentName" placeholder="Nhập tên học sinh">

        <button onclick="startExam()">Bắt đầu làm bài</button>
    </div>

    <!-- EXAM -->
    <div id="examBox" class="hidden">

        <div class="timer" id="timer">
            20:00
        </div>

        <!-- https://docs.google.com/forms/d/e/1FAIpQLSew_ygoZvP1kBtK74vuknMUUkbslawSg9ixdvZMnKoYtSrxQg/viewform?embedded=true -->
        <iframe 
        id="examFrame"
        src="https://docs.google.com/forms/d/e/FORM_ID/viewform?embedded=true">
        </iframe>

        <div class="warning" id="warningText"></div>

    </div>

</div>

<script>

//////////////////////////////////////////////////////
// CẤU HÌNH
//////////////////////////////////////////////////////

// WEBHOOK DISCORD
const webhookURL = "https://discord.com/api/webhooks/1502994532126560276/UO-dj1ynL5CDJk23Sz8QZt74xCI_QmTQtti-_SG38-Y0O1bALNrNfd5Z34j9Tp0xvMoZ";

// THỜI GIAN
let totalTime = 20 * 60;

// BIẾN
let student = "";
let examStarted = false;
let cheated = false;

//////////////////////////////////////////////////////
// BẮT ĐẦU
//////////////////////////////////////////////////////

function startExam(){

    student = document.getElementById("studentName").value.trim();

    if(student === ""){
        alert("Vui lòng nhập tên");
        return;
    }

    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("examBox").classList.remove("hidden");

    examStarted = true;

    sendDiscord(
        "🟢 Học sinh bắt đầu làm bài: **" + student + "**"
    );

    startTimer();
}

//////////////////////////////////////////////////////
// TIMER 20 PHÚT
//////////////////////////////////////////////////////

function startTimer(){

    const timer = document.getElementById("timer");

    const countdown = setInterval(() => {

        let minutes = Math.floor(totalTime / 60);
        let seconds = totalTime % 60;

        seconds = seconds < 10 ? "0" + seconds : seconds;

        timer.innerHTML = minutes + ":" + seconds;

        totalTime--;

        if(totalTime < 0){

            clearInterval(countdown);

            sendDiscord(
                "⏰ Hết giờ làm bài: **" + student + "**"
            );

            alert("Đã hết thời gian làm bài!");

            endExam();
        }

    },1000);
}

//////////////////////////////////////////////////////
// KẾT THÚC
//////////////////////////////////////////////////////

function endExam(){

    document.body.innerHTML = `
        <div style="
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-size:30px;
            font-weight:bold;
            color:red;
            background:#fff;
        ">
            BÀI THI ĐÃ KẾT THÚC
        </div>
    `;
}

//////////////////////////////////////////////////////
// CHỐNG COPY
//////////////////////////////////////////////////////

document.addEventListener("copy", function(e){

    e.preventDefault();

    if(examStarted){
        alert("Không được copy!");
    }

});

//////////////////////////////////////////////////////
// CHẶN CHUỘT PHẢI
//////////////////////////////////////////////////////

document.addEventListener("contextmenu", function(e){

    e.preventDefault();

});

//////////////////////////////////////////////////////
// PHÁT HIỆN CHUYỂN TAB
//////////////////////////////////////////////////////

document.addEventListener("visibilitychange", function(){

    if(document.hidden && examStarted && !cheated){

        cheated = true;

        document.getElementById("warningText").innerHTML =
            "PHÁT HIỆN GIAN LẬN!";

        sendDiscord(
            "🚨 Học sinh gian lận: **" + student + "** (Chuyển tab)"
        );

        alert("Bạn đã chuyển tab. Bài thi kết thúc!");

        endExam();
    }

});

//////////////////////////////////////////////////////
// PHÁT HIỆN RỜI CỬA SỔ
//////////////////////////////////////////////////////

window.addEventListener("blur", function(){

    if(examStarted && !cheated){

        cheated = true;

        document.getElementById("warningText").innerHTML =
            "PHÁT HIỆN GIAN LẬN!";

        sendDiscord(
            "🚨 Học sinh gian lận: **" + student + "** (Rời cửa sổ)"
        );

        alert("Bạn đã rời cửa sổ bài thi!");

        endExam();
    }

});

//////////////////////////////////////////////////////
// GỬI DISCORD
//////////////////////////////////////////////////////

function sendDiscord(message){

    fetch(webhookURL, {

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            content:message
        })

    });

}

//////////////////////////////////////////////////////
// CHẶN PHÍM TẮT
//////////////////////////////////////////////////////

document.addEventListener("keydown", function(e){

    // Ctrl+C
    if(e.ctrlKey && e.key.toLowerCase() === "c"){
        e.preventDefault();
    }

    // Ctrl+U
    if(e.ctrlKey && e.key.toLowerCase() === "u"){
        e.preventDefault();
    }

    // F12
    if(e.key === "F12"){
        e.preventDefault();
    }

    // Ctrl+Shift+I
    if(e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "i"){
        e.preventDefault();
    }

});

</script>

</body>
</html>
