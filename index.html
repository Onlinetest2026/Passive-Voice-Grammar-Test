<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Online Exam Lite Pro</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f4f4f4;
}

#startScreen { margin-top: 120px; }
#examScreen { display:none; }

iframe {
  width: 92%;
  height: 600px;
  border: 2px solid #333;
  border-radius: 8px;
}

.warning {
  color: red;
  font-weight: bold;
}

button { padding: 10px 20px; }
</style>
</head>

<body>

<!-- START -->
<div id="startScreen">
  <h2>ONLINE EXAM</h2>
  <input id="name" placeholder="Enter name">
  <br><br>
  <button onclick="startExam()">START</button>
</div>

<!-- EXAM -->
<div id="examScreen">
  <h3>Time: <span id="timer">20:00</span></h3>
  <div class="warning" id="warning"></div>

  <iframe id="form"
    src="https://docs.google.com/forms/d/e/1FAIpQLSew_ygoZvP1kBtK74vuknMUUkbslawSg9ixdvZMnKoYtSrxQg/viewform?embedded=true">
  </iframe>
</div>

<script>

// ================= CONFIG =================
const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1502994532126560276/UO-dj1ynL5CDJk23Sz8QZt74xCI_QmTQtti-_SG38-Y0O1bALNrNfd5Z34j9Tp0xvMoZ";

let name = "";
let timer;
let violations = 0;

// ⏱ persist time across reload
let remainingTime = sessionStorage.getItem("time")
  ? parseInt(sessionStorage.getItem("time"))
  : 20 * 60;

// ================= DISCORD =================
function log(msg){
  fetch(DISCORD_WEBHOOK,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({content:"👤 "+name+" | "+msg})
  });
}

// ================= START =================
function startExam(){

  name = document.getElementById("name").value;
  if(!name) return alert("Enter name");

  document.getElementById("startScreen").style.display="none";
  document.getElementById("examScreen").style.display="block";

  log("START EXAM");

  startTimer();

  document.addEventListener("visibilitychange", detectTab);
  window.addEventListener("blur", detectTab);

  document.addEventListener("copy", e=>e.preventDefault());
  document.addEventListener("paste", e=>e.preventDefault());
  document.addEventListener("contextmenu", e=>e.preventDefault());
}

// ================= TAB DETECT =================
function detectTab(){

  if(document.hidden || !document.hasFocus()){

    violations++;

    log("TAB SWITCH | attempt " + violations);

    // ===== FIRST TIME =====
    if(violations === 1){

      log("WARNING 1 - KICK USER");

      // save remaining time BEFORE reload
      sessionStorage.setItem("time", remainingTime);

      alert("Violation 1 - You are removed");

      setTimeout(()=>{
        location.reload();
      },500);
    }

    // ===== SECOND TIME =====
    if(violations >= 2){

      log("FINAL VIOLATION - AUTO SUBMIT");

      clearInterval(timer);

      document.getElementById("form").style.display="none";

      document.getElementById("warning").innerText =
        "EXAM AUTO SUBMITTED DUE TO CHEATING";

      alert("Auto submitted due to cheating");
    }
  }
}

// ================= TIMER =================
function startTimer(){

  timer = setInterval(()=>{

    remainingTime--;

    // save continuously
    sessionStorage.setItem("time", remainingTime);

    let m = Math.floor(remainingTime/60);
    let s = remainingTime%60;

    document.getElementById("timer").innerText =
      m+":"+(s<10?"0"+s:s);

    if(remainingTime <= 0){

      clearInterval(timer);

      log("TIME UP");

      document.getElementById("form").style.display="none";

      alert("Time is up!");
    }

  },1000);
}

</script>

</body>
</html>
