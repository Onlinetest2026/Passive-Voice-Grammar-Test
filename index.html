<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anti-Cheat Online Exam</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  text-align: center;
}

#startScreen {
  margin-top: 120px;
}

#examScreen {
  display: none;
}

iframe {
  width: 92%;
  height: 600px;
  border: 2px solid #333;
  border-radius: 8px;
}

button {
  padding: 10px 20px;
  font-size: 16px;
}

.warning {
  color: red;
  font-weight: bold;
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- START SCREEN -->
<div id="startScreen">
  <h2>ONLINE EXAM</h2>
  <input id="studentName" placeholder="Enter your name" />
  <br><br>
  <button onclick="startExam()">START</button>
</div>

<!-- EXAM SCREEN -->
<div id="examScreen">
  <h3>Time remaining: <span id="timer">20:00</span></h3>
  <div class="warning" id="warning"></div>

  <iframe id="formFrame"
    src="https://docs.google.com/forms/d/e/1FAIpQLSew_ygoZvP1kBtK74vuknMUUkbslawSg9ixdvZMnKoYtSrxQg/viewform?embedded=true">
  </iframe>
</div>

<script>

// ================= CONFIG =================
const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1502994532126560276/UO-dj1ynL5CDJk23Sz8QZt74xCI_QmTQtti-_SG38-Y0O1bALNrNfd5Z34j9Tp0xvMoZ";

let name = "";
let time = 20 * 60;
let violations = 0;

// 🔒 permanent ban flag
let banned = localStorage.getItem("banned") === "true";

// ================= DISCORD =================
function sendDiscord(msg) {
  fetch(DISCORD_WEBHOOK, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({content: msg})
  });
}

// ================= START =================
function startExam() {

  if (banned) {
    alert("You are permanently banned from this exam.");
    return;
  }

  name = document.getElementById("studentName").value;

  if (!name) {
    alert("Please enter your name!");
    return;
  }

  document.getElementById("startScreen").style.display = "none";
  document.getElementById("examScreen").style.display = "block";

  // reset timer EACH start
  time = 20 * 60;
  violations = 0;

  sendDiscord("🟢 " + name + " started the exam");

  startTimer();

  document.addEventListener("visibilitychange", handleTabSwitch);

  document.addEventListener("copy", e => {
    e.preventDefault();
    alert("Copying is not allowed!");
  });
}

// ================= TAB SWITCH =================
function handleTabSwitch() {
  if (document.hidden) {
    violations++;

    // ===== FIRST VIOLATION =====
    if (violations === 1) {
      sendDiscord("⚠️ " + name + " switched tab (WARNING 1)");

      document.getElementById("warning").innerText =
        "Warning 1: You will be removed and must restart.";

      alert("Violation 1 detected! You will be removed.");

      // reset session (timer will restart)
      setTimeout(() => {
        location.reload();
      }, 500);
    }

    // ===== SECOND VIOLATION =====
    if (violations >= 2) {
      sendDiscord("❌ " + name + " switched tab (FINAL VIOLATION)");

      document.getElementById("warning").innerText =
        "YOU ARE BANNED FROM THIS EXAM";

      alert("You are permanently banned!");

      // set permanent ban
      localStorage.setItem("banned", "true");

      lockExam(true);
    }
  }
}

// ================= LOCK EXAM =================
function lockExam(autoSubmit = false) {

  document.getElementById("formFrame").style.display = "none";

  if (autoSubmit) {
    sendDiscord("📤 " + name + " exam auto-submitted due to cheating");
  }

  document.getElementById("warning").innerText =
    "Exam closed.";
}

// ================= TIMER =================
function startTimer() {
  let t = time;

  let timer = setInterval(() => {
    t--;

    let m = Math.floor(t / 60);
    let s = t % 60;

    document.getElementById("timer").innerText =
      m + ":" + (s < 10 ? "0" + s : s);

    if (t <= 0) {
      clearInterval(timer);

      sendDiscord("⏰ " + name + " time is up");

      alert("Time is up!");

      lockExam(true);
    }
  }, 1000);
}

</script>

</body>
</html>
