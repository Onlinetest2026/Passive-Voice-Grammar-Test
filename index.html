<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anti-Cheat Exam System</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  text-align: center;
}

#startScreen {
  margin-top: 120px;
}

#examScreen {
  display: none;
}

iframe {
  width: 92%;
  height: 600px;
  border: 2px solid #333;
  border-radius: 8px;
}

button {
  padding: 10px 20px;
  font-size: 16px;
}

.warning {
  color: red;
  font-weight: bold;
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- START SCREEN -->
<div id="startScreen">
  <h2>ONLINE EXAM</h2>
  <input id="studentName" placeholder="Enter your name" />
  <br><br>
  <button onclick="startExam()">START</button>
</div>

<!-- EXAM SCREEN -->
<div id="examScreen">
  <h3>Time remaining: <span id="timer">20:00</span></h3>
  <div class="warning" id="warning"></div>

  <iframe id="formFrame"
    src="https://docs.google.com/forms/d/e/1FAIpQLSew_ygoZvP1kBtK74vuknMUUkbslawSg9ixdvZMnKoYtSrxQg/viewform?embedded=true">
  </iframe>
</div>

<script>

// ================= CONFIG =================
const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1502994532126560276/UO-dj1ynL5CDJk23Sz8QZt74xCI_QmTQtti-_SG38-Y0O1bALNrNfd5Z34j9Tp0xvMoZ";

// ================= STATE =================
let name = "";
let timer;
let violations = parseInt(localStorage.getItem("violations") || "0");
let banned = localStorage.getItem("banned") === "true";
let remainingTime = parseInt(localStorage.getItem("time") || (20 * 60));

// ================= DISCORD =================
function sendDiscord(msg) {
  fetch(DISCORD_WEBHOOK, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({content: "👤 " + name + " | " + msg})
  });
}

// ================= START =================
function startExam() {

  if (banned) {
    alert("You are permanently banned from this exam.");
    return;
  }

  name = document.getElementById("studentName").value;

  if (!name) {
    alert("Please enter your name!");
    return;
  }

  document.getElementById("startScreen").style.display = "none";
  document.getElementById("examScreen").style.display = "block";

  sendDiscord("STARTED EXAM");

  startTimer();

  document.addEventListener("visibilitychange", handleViolation);

  document.addEventListener("copy", e => e.preventDefault());
  document.addEventListener("paste", e => e.preventDefault());
  document.addEventListener("contextmenu", e => e.preventDefault());
}

// ================= VIOLATION =================
function handleViolation() {

  if (document.hidden) {

    violations++;
    localStorage.setItem("violations", violations);

    sendDiscord("TAB SWITCH DETECTED | Attempt: " + violations);

    // ================= FIRST VIOLATION =================
    if (violations === 1) {

      // save current time before reload
      localStorage.setItem("time", remainingTime);

      sendDiscord("WARNING 1 - STUDENT KICKED");

      document.getElementById("warning").innerText =
        "Warning 1: You were removed from the exam.";

      alert("Violation 1 detected. You will be removed.");

      setTimeout(() => location.reload(), 500);
    }

    // ================= SECOND VIOLATION =================
    if (violations >= 2) {

      sendDiscord("FINAL VIOLATION - STUDENT BANNED");

      localStorage.setItem("banned", "true");

      document.getElementById("warning").innerText =
        "You are permanently banned.";

      alert("You are permanently banned!");

      lockExam(true);
    }
  }
}

// ================= TIMER =================
function startTimer() {

  timer = setInterval(() => {

    remainingTime--;

    // save continuously (important)
    localStorage.setItem("time", remainingTime);

    let m = Math.floor(remainingTime / 60);
    let s = remainingTime % 60;

    document.getElementById("timer").innerText =
      m + ":" + (s < 10 ? "0" + s : s);

    if (remainingTime <= 0) {
      clearInterval(timer);

      sendDiscord("TIME UP - AUTO SUBMIT");

      lockExam(true);
    }

  }, 1000);
}

// ================= LOCK =================
function lockExam(autoSubmit = false) {

  clearInterval(timer);

  document.getElementById("formFrame").style.display = "none";

  if (autoSubmit) {
    sendDiscord("EXAM AUTO SUBMITTED OR LOCKED");
  }

  document.getElementById("warning").innerText =
    "Exam closed.";
}

</script>

</body>
</html>
