<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Anti Cheat Online Exam</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  text-align: center;
}

#startScreen {
  margin-top: 120px;
}

#examScreen {
  display: none;
}

iframe {
  width: 92%;
  height: 600px;
  border: 2px solid #333;
  border-radius: 8px;
}

button {
  padding: 10px 20px;
  font-size: 16px;
}

.warning {
  color: red;
  font-weight: bold;
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- START SCREEN -->
<div id="startScreen">
  <h2>KIỂM TRA ONLINE</h2>
  <input id="studentName" placeholder="Nhập tên của bạn" />
  <br><br>
  <button onclick="startExam()">START</button>
</div>

<!-- EXAM SCREEN -->
<div id="examScreen">
  <h3>Thời gian còn lại: <span id="timer">20:00</span></h3>
  <div class="warning" id="warning"></div>

  <iframe id="formFrame"
    src="https://docs.google.com/forms/d/e/1FAIpQLSew_ygoZvP1kBtK74vuknMUUkbslawSg9ixdvZMnKoYtSrxQg/viewform?embedded=true">
  </iframe>
</div>

<script>
// ================= CONFIG =================
const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1502994532126560276/UO-dj1ynL5CDJk23Sz8QZt74xCI_QmTQtti-_SG38-Y0O1bALNrNfd5Z34j9Tp0xvMoZ";
let name = "";
let time = 20 * 60;
let violations = 0;

// load lại trạng thái nếu có
if (localStorage.getItem("violations")) {
  violations = parseInt(localStorage.getItem("violations"));
}

// ================= DISCORD =================
function sendDiscord(msg) {
  fetch(DISCORD_WEBHOOK, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({content: msg})
  });
}

// ================= START EXAM =================
function startExam() {
  name = document.getElementById("studentName").value;

  if (!name) {
    alert("Vui lòng nhập tên!");
    return;
  }

  document.getElementById("startScreen").style.display = "none";
  document.getElementById("examScreen").style.display = "block";

  sendDiscord("🟢 " + name + " bắt đầu bài thi");

  startTimer();

  document.addEventListener("visibilitychange", handleTabSwitch);

  document.addEventListener("copy", function(e) {
    e.preventDefault();
    alert("Không được copy!");
  });
}

// ================= TAB CHECK =================
function handleTabSwitch() {
  if (document.hidden) {
    violations++;
    localStorage.setItem("violations", violations);

    // ===== LẦN 1 =====
    if (violations === 1) {
      sendDiscord("⚠️ " + name + " chuyển tab (LẦN 1)");

      document.getElementById("warning").innerText =
        "⚠️ Vi phạm lần 1 - bạn sẽ bị đưa ra ngoài!";

      alert("Bạn đã vi phạm lần 1!");

      setTimeout(() => {
        location.reload();
      }, 500);
    }

    // ===== LẦN 2 =====
    if (violations >= 2) {
      sendDiscord("❌ " + name + " chuyển tab (LẦN 2) - BỊ LOẠI");

      document.getElementById("warning").innerText =
        "❌ BẠN ĐÃ BỊ LOẠI KHỎI BÀI THI";

      alert("Bạn đã bị loại khỏi bài thi!");

      lockExam(true);
    }
  }
}

// ================= LOCK EXAM =================
function lockExam(autoSubmit = false) {
  document.getElementById("formFrame").style.display = "none";

  if (autoSubmit) {
    sendDiscord("📤 " + name + " bị khóa bài và coi như nộp bài");
  }
}

// ================= TIMER =================
function startTimer() {
  let t = time;

  let timer = setInterval(() => {
    t--;

    let m = Math.floor(t / 60);
    let s = t % 60;

    document.getElementById("timer").innerText =
      m + ":" + (s < 10 ? "0" + s : s);

    if (t <= 0) {
      clearInterval(timer);

      sendDiscord("⏰ " + name + " hết giờ làm bài");

      alert("Hết giờ!");

      lockExam(true);
    }
  }, 1000);
}
</script>

</body>
</html>
