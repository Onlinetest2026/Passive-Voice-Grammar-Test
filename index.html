<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Online Exam Secure Lite</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f4f4f4;
}

#startScreen {
  margin-top: 120px;
}

#examScreen {
  display: none;
}

iframe {
  width: 92%;
  height: 600px;
  border: 2px solid #333;
  border-radius: 8px;
}

.warning {
  color: red;
  font-weight: bold;
  margin-top: 10px;
}

button {
  padding: 10px 20px;
}
</style>
</head>

<body>

<!-- START -->
<div id="startScreen">
  <h2>ONLINE EXAM</h2>
  <input id="name" placeholder="Enter your name">
  <br><br>
  <button onclick="startExam()">START</button>
</div>

<!-- EXAM -->
<div id="examScreen">
  <h3>Time: <span id="timer">20:00</span></h3>
  <div class="warning" id="warning"></div>

  <iframe id="form"
    src="https://docs.google.com/forms/d/e/1FAIpQLSew_ygoZvP1kBtK74vuknMUUkbslawSg9ixdvZMnKoYtSrxQg/viewform?embedded=true">
  </iframe>
</div>

<script>

// ================= CONFIG =================
const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1502994532126560276/UO-dj1ynL5CDJk23Sz8QZt74xCI_QmTQtti-_SG38-Y0O1bALNrNfd5Z34j9Tp0xvMoZ";

let name = "";
let time = 20 * 60;
let violations = 0;

// 🔒 session only (reset khi đổi link/tab mới)
let locked = sessionStorage.getItem("locked") === "true";

// ================= DISCORD =================
function log(msg){
  fetch(DISCORD_WEBHOOK,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({content:"👤 "+name+" | "+msg})
  });
}

// ================= START =================
function startExam(){

  if(locked){
    alert("You are locked from this session.");
    return;
  }

  name = document.getElementById("name").value;
  if(!name) return alert("Enter name");

  document.getElementById("startScreen").style.display="none";
  document.getElementById("examScreen").style.display="block";

  log("START EXAM");

  startTimer();

  document.addEventListener("visibilitychange", detectTab);
  window.addEventListener("blur", detectTab);

  document.addEventListener("copy", e=>e.preventDefault());
  document.addEventListener("paste", e=>e.preventDefault());
  document.addEventListener("contextmenu", e=>e.preventDefault());
}

// ================= TAB DETECT =================
function detectTab(){

  if(document.hidden || !document.hasFocus()){

    violations++;

    log("TAB SWITCH | attempt " + violations);

    // ===== FIRST VIOLATION =====
    if(violations === 1){

      log("WARNING 1 - KICK USER");

      alert("Violation 1 - You will be removed");

      setTimeout(()=>{
        location.reload();
      },500);
    }

    // ===== SECOND VIOLATION =====
    if(violations >= 2){

      log("FINAL VIOLATION - SESSION LOCKED");

      sessionStorage.setItem("locked","true");
      locked = true;

      document.getElementById("form").style.display="none";

      document.getElementById("warning").innerText =
        "YOU ARE PERMANENTLY LOCKED IN THIS SESSION";

      alert("You are permanently locked!");
    }
  }
}

// ================= TIMER =================
function startTimer(){

  let timer = setInterval(()=>{

    time--;

    let m = Math.floor(time/60);
    let s = time%60;

    document.getElementById("timer").innerText =
      m+":"+(s<10?"0"+s:s);

    if(time<=0){

      clearInterval(timer);

      log("TIME UP");

      document.getElementById("form").style.display="none";

      alert("Time is up!");
    }

  },1000);
}

</script>

</body>
</html>
