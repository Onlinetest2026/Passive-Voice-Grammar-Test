<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Online Test Secure</title>

<style>

body{
    margin:0;
    overflow:hidden;
    font-family:Arial;
    background:#111;
}

#warning{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:red;
    color:white;
    text-align:center;
    padding:10px;
    z-index:9999;
    display:none;
    font-size:18px;
}

#blocked{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    color:white;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:10000;
    font-size:30px;
}

iframe{
    width:100%;
    height:100vh;
    border:none;
}

</style>
</head>

<body>

<div id="warning">
⚠️ Không được chuyển tab hoặc rời cửa sổ kiểm tra!
</div>

<div id="blocked">
    <h1>BẠN ĐÃ BỊ LOẠI KHỎI BÀI KIỂM TRA</h1>
    <p>Phát hiện hành vi gian lận.</p>
</div>

<iframe
src="https://docs.google.com/forms/d/e/1FAIpQLSew_ygoZvP1kBtK74vuknMUUkbslawSg9ixdvZMnKoYtSrxQg/viewform?embedded=true">
</iframe>

<script>

let cheated = false;

const webhook =
"https://discord.com/api/webhooks/1502994532126560276/UO-dj1ynL5CDJk23Sz8QZt74xCI_QmTQtti-_SG38-Y0O1bALNrNfd5Z34j9Tp0xvMoZ";

function sendCheatLog(reason){

    fetch(webhook,{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            content:
            "🚨 HỌC SINH GIAN LẬN\n"
            + "Lý do: " + reason + "\n"
            + "Thời gian: "
            + new Date().toLocaleString()
        })
    });

}

function blockStudent(){

    document.getElementById("blocked").style.display="flex";

    sendCheatLog("Chuyển tab / rời cửa sổ");

}

document.addEventListener("visibilitychange",()=>{

    if(document.hidden && !cheated){

        cheated = true;

        document.getElementById("warning").style.display="block";

        setTimeout(()=>{
            blockStudent();
        },1000);

    }

});

window.addEventListener("blur",()=>{

    if(!cheated){

        cheated = true;

        document.getElementById("warning").style.display="block";

        setTimeout(()=>{
            blockStudent();
        },1000);

    }

});

document.addEventListener("copy",(e)=>{
    e.preventDefault();

    sendCheatLog("Copy nội dung");

    alert("Không được copy!");
});

document.addEventListener("cut",(e)=>{
    e.preventDefault();
});

document.addEventListener("paste",(e)=>{
    e.preventDefault();
});

document.addEventListener("contextmenu",(e)=>{
    e.preventDefault();
});

document.addEventListener("keydown",(e)=>{

    // F12
    if(e.key === "F12"){
        e.preventDefault();
    }

    // Ctrl+C
    if(e.ctrlKey && e.key.toLowerCase() === "c"){
        e.preventDefault();
    }

    // Ctrl+U
    if(e.ctrlKey && e.key.toLowerCase() === "u"){
        e.preventDefault();
    }

    // Ctrl+Shift+I
    if(
        e.ctrlKey &&
        e.shiftKey &&
        e.key.toLowerCase() === "i"
    ){
        e.preventDefault();
    }

});

</script>

</body>
</html>
