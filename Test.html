<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Online Examination System</title>
    <style>
        :root {
            --primary: #2563eb;
            --danger: #dc2626;
            --bg: #f8fafc;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #setup-container, #exam-container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 800px; }
        #exam-container { display: none; height: 90vh; flex-direction: column; }
        input { padding: 10px; width: 80%; margin-bottom: 1rem; border: 1px solid #cbd5e1; border-radius: 6px; }
        button { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #timer { font-size: 1.5rem; color: var(--danger); font-weight: bold; margin-bottom: 10px; }
        iframe { flex-grow: 1; border: none; border-radius: 8px; width: 100%; }
        .warning-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: white; display: none; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; }
    </style>
</head>
<body>

    <!-- Setup Screen -->
    <div id="setup-container">
        <h2>Online Examination</h2>
        <p>Please enter your full name to begin. Switching tabs or copying is strictly prohibited.</p>
        <input type="text" id="studentName" placeholder="Enter Full Name..." required>
        <br>
        <button onclick="startExam()">START EXAM</button>
    </div>

    <!-- Exam Screen -->
    <div id="exam-container">
        <div id="timer">Time Remaining: 20:00</div>
        <iframe id="examFrame" src="https://docs.google.com/forms/d/e/1FAIpQLSew_ygoZvP1kBtK74vuknMUUkbslawSg9ixdvZMnKoYtSrxQg/viewform?embedded=true"></iframe>
    </div>

    <!-- Kick Overlay -->
    <div id="warning-overlay" class="warning-overlay">
        <h1>VIOLATION DETECTED</h1>
        <p id="violation-msg">You have been removed for switching tabs.</p>
        <button onclick="location.reload()">Reload & Continue</button>
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1502994532126560276/UO-dj1ynL5CDJk23Sz8QZt74xCI_QmTQtti-_SG38-Y0O1bALNrNfd5Z34j9Tp0xvMoZ";
        let timeLeft = localStorage.getItem('examTime') ? parseInt(localStorage.getItem('examTime')) : 1200; // 20 mins
        let violations = localStorage.getItem('violations') ? parseInt(localStorage.getItem('violations')) : 0;
        let studentName = "";
        let timerInterval;

        function startExam() {
            studentName = document.getElementById('studentName').value;
            if (!studentName) return alert("Please enter your name!");
            
            document.getElementById('setup-container').style.display = 'none';
            document.getElementById('exam-container').style.display = 'flex';
            
            startTimer();
            initAntiCheat();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                localStorage.setItem('examTime', timeLeft);
                
                let mins = Math.floor(timeLeft / 60);
                let secs = timeLeft % 60;
                document.getElementById('timer').innerText = `Time Remaining: ${mins}:${secs < 10 ? '0' : ''}${secs}`;

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert("Time is up! Your work is being submitted.");
                    location.reload();
                }
            }, 1000);
        }

        function reportToDiscord(type) {
            violations++;
            localStorage.setItem('violations', violations);
            
            const payload = {
                embeds: [{
                    title: "⚠️ Anti-Cheat Alert",
                    color: 15158332,
                    fields: [
                        { name: "Student Name", value: studentName, inline: true },
                        { name: "Violation Type", value: type, inline: true },
                        { name: "Total Violations", value: violations.toString(), inline: true },
                        { name: "Time Left", value: document.getElementById('timer').innerText, inline: false }
                    ],
                    timestamp: new Date()
                }]
            };

            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            kickStudent();
        }

        function kickStudent() {
            document.getElementById('warning-overlay').style.display = 'flex';
            clearInterval(timerInterval);
        }

        function initAntiCheat() {
            // 1. Detect Tab Switching
            window.onblur = () => {
                reportToDiscord("Tab Switched / Lost Focus");
            };

            // 2. Disable Copy/Paste/Cut
            document.addEventListener('copy', (e) => { e.preventDefault(); alert("Copying is disabled!"); });
            document.addEventListener('paste', (e) => { e.preventDefault(); });
            
            // 3. Prevent Right Click
            document.addEventListener('contextmenu', event => event.preventDefault());
        }
    </script>
</body>
</html>
