<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Examination Portal</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none; /* Disable text selection */
        }

        #login-container, #exam-container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 800px;
        }

        #exam-container { display: none; height: 90vh; }

        input[type="text"] {
            padding: 10px;
            width: 250px;
            border: 2px solid #ddd;
            border-radius: 5px;
            margin-bottom: 1rem;
        }

        button {
            padding: 10px 25px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        #timer {
            font-size: 1.5rem;
            color: #e74c3c;
            font-weight: bold;
            margin-bottom: 10px;
        }

        iframe {
            width: 100%;
            height: 80%;
            border: none;
        }

        .warning-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            color: white;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
    </style>
</head>
<body oncontextmenu="return false;"> <!-- Disable Right Click -->

    <!-- Login Section -->
    <div id="login-container">
        <h2>Enter Your Full Name to Start</h2>
        <input type="text" id="studentName" placeholder="John Doe">
        <br>
        <button onclick="startExam()">START</button>
    </div>

    <!-- Exam Section -->
    <div id="exam-container">
        <div id="timer">Time Remaining: 20:00</div>
        <iframe id="https://docs.google.com/forms/d/e/1FAIpQLSew_ygoZvP1kBtK74vuknMUUkbslawSg9ixdvZMnKoYtSrxQg/viewform?embedded=true"></iframe>
    </div>

    <!-- Violation Message -->
    <div id="warning-overlay" class="warning-overlay">
        <h1 id="warning-text">VIOLATION DETECTED!</h1>
        <p id="warning-sub">You have been logged out for switching tabs.</p>
        <button onclick="location.reload()">Reload & Resume</button>
    </div>

    <script>
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1502994532126560276/UO-dj1ynL5CDJk23Sz8QZt74xCI_QmTQtti-_SG38-Y0O1bALNrNfd5Z34j9Tp0xvMoZ";
        const TOTAL_TIME = 20 * 60; // 20 minutes
        let timeLeft = localStorage.getItem('timeLeft') ? parseInt(localStorage.getItem('timeLeft')) : TOTAL_TIME;
        let violations = localStorage.getItem('violations') ? parseInt(localStorage.getItem('violations')) : 0;
        let isSubmitted = localStorage.getItem('isSubmitted') === 'true';
        let studentName = localStorage.getItem('studentName') || "";

        // Check if already finished
        if (isSubmitted) {
            alert("You have already submitted this exam. No further attempts allowed.");
        }

        function startExam() {
            const nameInput = document.getElementById('studentName').value;
            if (!nameInput) return alert("Please enter your name");
            
            studentName = nameInput;
            localStorage.setItem('studentName', studentName);
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('exam-container').style.display = 'block';
            
            startTimer();
            monitorTabSwitch();
        }

        function startTimer() {
            const timerDisplay = document.getElementById('timer');
            const interval = setInterval(() => {
                if (isSubmitted) { clearInterval(interval); return; }
                
                let mins = Math.floor(timeLeft / 60);
                let secs = timeLeft % 60;
                timerDisplay.innerText = `Time Remaining: ${mins}:${secs < 10 ? '0' : ''}${secs}`;
                
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    autoSubmit("Time Expired");
                }
                timeLeft--;
                localStorage.setItem('timeLeft', timeLeft);
            }, 1000);
        }

        function monitorTabSwitch() {
            document.addEventListener("visibilitychange", () => {
                if (document.hidden && !isSubmitted) {
                    violations++;
                    localStorage.setItem('violations', violations);
                    reportToDiscord(violations);

                    if (violations === 1 || violations === 2) {
                        showKickOut(violations);
                    } else if (violations >= 3) {
                        autoSubmit("Third Violation - Auto Submit");
                    }
                }
            });
        }

        function showKickOut(count) {
            document.getElementById('exam-container').style.display = 'none';
            const overlay = document.getElementById('warning-overlay');
            overlay.style.display = 'flex';
            document.getElementById('warning-text').innerText = `VIOLATION #${count}`;
            document.getElementById('warning-sub').innerText = "You switched tabs. You have been kicked out. Refresh to resume.";
        }

        function autoSubmit(reason) {
            isSubmitted = true;
            localStorage.setItem('isSubmitted', 'true');
            document.getElementById('exam-container').innerHTML = `<h1>Exam Finished</h1><p>Reason: ${reason}</p>`;
            reportToDiscord(`FINAL SUBMISSION: ${reason}`);
        }

        async function reportToDiscord(vCount) {
            const payload = {
                content: `🚨 **Anti-Cheat Alert** 🚨\n**Student:** ${studentName}\n**Action:** ${typeof vCount === 'number' ? 'Tab Switch #' + vCount : vCount}\n**Time Remaining:** ${Math.floor(timeLeft/60)}m`
            };
            
            fetch(DISCORD_WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        }

        // Disable Copy Paste
        window.addEventListener('copy', (e) => e.preventDefault());
        window.addEventListener('paste', (e) => e.preventDefault());
    </script>
</body>
</html>
