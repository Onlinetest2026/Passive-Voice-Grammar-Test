<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proctoring Monitor System</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #login-container, #exam-container {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 900px;
        }

        #exam-container { display: none; height: 95vh; flex-direction: column; }

        input {
            padding: 12px; width: 250px; border-radius: 6px; border: 1px solid #334155;
            background: #0f172a; color: white; margin-bottom: 20px;
        }

        button {
            padding: 12px 30px; background: #38bdf8; color: #0f172a;
            border: none; border-radius: 6px; cursor: pointer; font-weight: bold;
        }

        #timer { font-size: 1.8rem; color: #fb7185; margin-bottom: 10px; font-weight: bold; }

        iframe { flex-grow: 1; width: 100%; border: none; border-radius: 8px; background: white; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95); display: none;
            flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- Form nhập tên -->
    <div id="login-container">
        <h1 style="color: #38bdf8;">EXAM SYSTEM</h1>
        <input type="text" id="stdName" placeholder="Enter Your Full Name..." autocomplete="off">
        <br>
        <button onclick="startExam()">START TEST</button>
    </div>

    <!-- Màn hình làm bài -->
    <div id="exam-container">
        <div id="timer">20:00</div>
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSew_ygoZvP1kBtK74vuknMUUkbslawSg9ixdvZMnKoYtSrxQg/viewform?embedded=true"></iframe>
    </div>

    <!-- Màn hình đuổi ra khi chuyển tab -->
    <div id="overlay" class="overlay">
        <h1 style="color: #f43f5e; font-size: 3rem;">TAB SWITCH DETECTED!</h1>
        <p id="violation-info" style="font-size: 1.5rem;"></p>
        <p>This incident has been logged and sent to your teacher.</p>
        <button onclick="resumeExam()">CONTINUE TEST</button>
    </div>

    <script>
        // Cấu hình
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1502994532126560276/UO-dj1ynL5CDJk23Sz8QZt74xCI_QmTQtti-_SG38-Y0O1bALNrNfd5Z34j9Tp0xvMoZ";
        const TOTAL_TIME = 20 * 60;

        // Khởi tạo
        let name = localStorage.getItem('exam_name') || "";
        let timeLeft = localStorage.getItem('exam_time') ? parseInt(localStorage.getItem('exam_time')) : TOTAL_TIME;

        function startExam() {
            const inputName = document.getElementById('stdName').value.trim();
            if (!inputName) return alert("Please enter your name!");
            
            name = inputName;
            localStorage.setItem('exam_name', name);
            
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('exam-container').style.display = 'flex';

            runTimer();
            monitorCheating();
        }

        function runTimer() {
            const display = document.getElementById('timer');
            const countdown = setInterval(() => {
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                display.innerText = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
                
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    alert("Time's up!");
                }
                timeLeft--;
                localStorage.setItem('exam_time', timeLeft);
            }, 1000);
        }

        function monitorCheating() {
            // Sự kiện thoát Tab
            document.addEventListener("visibilitychange", () => {
                if (document.hidden) {
                    // LẤY GIÁ TRỊ MỚI NHẤT TỪ STORAGE ĐỂ CỘNG DỒN (QUAN TRỌNG)
                    let currentViolations = parseInt(localStorage.getItem('v_count')) || 0;
                    currentViolations++;
                    
                    // LƯU LẠI NGAY LẬP TỨC
                    localStorage.setItem('v_count', currentViolations);

                    // Đuổi học sinh ra màn hình cảnh báo
                    document.getElementById('exam-container').style.display = 'none';
                    document.getElementById('overlay').style.display = 'flex';
                    document.getElementById('violation-info').innerText = `Violation Count: ${currentViolations}`;

                    // Gửi lên Discord
                    sendDiscord(currentViolations);
                }
            });

            // Chặn Copy-Paste
            document.oncopy = e => e.preventDefault();
            document.onpaste = e => e.preventDefault();
        }

        function resumeExam() {
            // Khi nhấn Resume, chỉ đơn giản là hiện lại bài và cho làm tiếp
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('exam-container').style.display = 'flex';
        }

        async function sendDiscord(count) {
            const timeStr = `${Math.floor(timeLeft/60)}m ${timeLeft%60}s`;
            const payload = {
                embeds: [{
                    title: "🚨 PHÁT HIỆN GIAN LẬN",
                    color: 15548997,
                    fields: [
                        { name: "Học sinh", value: `**${name}**`, inline: true },
                        { name: "Trạng thái", value: `🛑 **Chuyển Tab Lần ${count}**`, inline: true },
                        { name: "Thời gian còn lại", value: timeStr, inline: false }
                    ],
                    timestamp: new Date()
                }]
            };

            await fetch(DISCORD_WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        }
    </script>
</body>
</html>
