<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proctoring Monitor - English Test</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #login-container, #exam-container {
            background: #1e293b;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 1000px;
        }

        #exam-container { display: none; height: 95vh; width: 95vw; }

        input {
            padding: 12px;
            width: 300px;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 35px;
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 800;
            text-transform: uppercase;
        }

        #timer-display {
            font-size: 2rem;
            color: #fb7185;
            margin-bottom: 10px;
            font-family: monospace;
        }

        iframe {
            width: 100%;
            height: 85%;
            border: 1px solid #334155;
            border-radius: 8px;
        }

        .alert-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- Login -->
    <div id="login-container">
        <h1 style="color: #38bdf8;">EXAMINATION SYSTEM</h1>
        <p>Enter your full name to start the 20-minute test.</p>
        <input type="text" id="stdName" placeholder="Enter your name..." autocomplete="off">
        <br>
        <button onclick="initExam()">Start Exam</button>
    </div>

    <!-- Exam Content -->
    <div id="exam-container">
        <div id="timer-display">TIME: 20:00</div>
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSew_ygoZvP1kBtK74vuknMUUkbslawSg9ixdvZMnKoYtSrxQg/viewform?embedded=true"></iframe>
    </div>

    <!-- Warning Screen -->
    <div id="alert-screen" class="alert-screen">
        <h1 style="color: #f43f5e; font-size: 4rem;">TAB SWITCH DETECTED!</h1>
        <p id="violation-count-text" style="font-size: 1.5rem;"></p>
        <p>This incident has been reported to the teacher.</p>
        <button onclick="resumeExam()">Resume Test</button>
    </div>

    <script>
        // 1. SETTINGS
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1502994532126560276/UO-dj1ynL5CDJk23Sz8QZt74xCI_QmTQtti-_SG38-Y0O1bALNrNfd5Z34j9Tp0xvMoZ";
        const TOTAL_SECONDS = 20 * 60;

        // 2. DATA TRACKING
        let name = localStorage.getItem('exam_name') || "";
        let timeLeft = localStorage.getItem('exam_time') ? parseInt(localStorage.getItem('exam_time')) : TOTAL_SECONDS;
        let vCount = localStorage.getItem('exam_violations') ? parseInt(localStorage.getItem('exam_violations')) : 0;

        window.onload = () => {
            if (name) { 
                document.getElementById('stdName').value = name;
            }
        };

        function initExam() {
            const inputName = document.getElementById('stdName').value.trim();
            if (!inputName) return alert("Please enter your name!");
            
            name = inputName;
            localStorage.setItem('exam_name', name);
            
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('exam-container').style.display = 'block';

            startTimer();
            startMonitoring();
        }

        function startTimer() {
            const timerDiv = document.getElementById('timer-display');
            const countdown = setInterval(() => {
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                timerDiv.innerText = `TIME: ${m}:${s < 10 ? '0' : ''}${s}`;

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    document.getElementById('exam-container').innerHTML = "<h1>Time is up! Please submit your form.</h1>";
                }
                timeLeft--;
                localStorage.setItem('exam_time', timeLeft);
            }, 1000);
        }

        function startMonitoring() {
            document.addEventListener("visibilitychange", () => {
                if (document.hidden) {
                    vCount++;
                    localStorage.setItem('exam_violations', vCount);
                    
                    // Show warning screen
                    document.getElementById('exam-container').style.display = 'none';
                    document.getElementById('alert-screen').style.display = 'flex';
                    document.getElementById('violation-count-text').innerText = `Violation Count: ${vCount}`;

                    sendToDiscord(vCount);
                }
            });

            // Anti copy-paste
            document.addEventListener('copy', (e) => e.preventDefault());
            document.addEventListener('paste', (e) => e.preventDefault());
        }

        function resumeExam() {
            document.getElementById('alert-screen').style.display = 'none';
            document.getElementById('exam-container').style.display = 'block';
        }

        async function sendToDiscord(count) {
            const payload = {
                embeds: [{
                    title: "🚨 CHEATING ALERT",
                    color: 15548997, // Red
                    fields: [
                        { name: "Student Name", value: `**${name}**`, inline: true },
                        { name: "Violation", value: `**Switch Tab - Time #${count}**`, inline: true },
                        { name: "Time Remaining", value: `${Math.floor(timeLeft/60)}m ${timeLeft%60}s`, inline: false }
                    ],
                    timestamp: new Date()
                }]
            };

            await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        }
    </script>
</body>
</html>
